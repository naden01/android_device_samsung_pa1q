# pa1q recovery thermal-engine config — step-wise (SS) CPU frequency throttling.
#
# WHY THIS EXISTS: in normal Android the Samsung thermal stack loads CPU throttle
# rules at runtime, so /vendor/etc/thermal-engine.conf ships EMPTY. In recovery
# that stack never runs, so the stock thermal-engine-v2 starts but logs
# "ss_algo_init: No SS's configured" and never throttles — the prime cluster runs
# at 4.47GHz and hits 104-105°C under load (e.g. a backup) before the kernel's
# only CPU cooling-map (cpu-pause at 118°C) even engages.
#
# This is the OFFICIAL mechanism: the stock /vendor/bin/thermal-engine-v2 reads
# these step-wise (algo_type=ss) rules and actuates the kernel cpufreq cooling
# devices (cpufreq-cpu0 = silver cluster 0-5, cpufreq-cpu6 = prime cluster 6-7),
# which the DTS defines but leaves unmapped. The engine dynamically lowers the
# cluster max freq as temperature rises past set_point and releases it on cooldown
# — exactly like Android. Proven live 2026-06-26: 105.5°C -> 82.6°C under an
# 8-thread load, cdev released back to 0 when idle.
#
# UNIVERSAL across the S25 "sun" line (pa1q/pa3q/...): sensor names (cpu-1-0-1 etc.)
# and cooling-device names (cpufreq-cpuN) are the SoC's, not model-specific — no
# hardcoded device identity. set_point 85°C is the throttle trigger; set_point_clr
# 75°C is the release point (hysteresis).

[PRIME-CPU-SS]
algo_type ss
sampling 1000
sensor cpu-1-0-1
device cpufreq-cpu6
set_point 85000
set_point_clr 75000

[PRIME-CPU-SS2]
algo_type ss
sampling 1000
sensor cpu-1-1-1
device cpufreq-cpu6
set_point 85000
set_point_clr 75000

[SILVER-CPU-SS]
algo_type ss
sampling 1000
sensor cpu-0-0-0
device cpufreq-cpu0
set_point 85000
set_point_clr 75000
